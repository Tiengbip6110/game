<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline Slither.io Clone</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px black;
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #leaderboard {
            position: absolute;
            top: 20px;
            right: 170px; /* Leave space for minimap */
            width: 200px;
            text-align: right;
            font-size: 16px;
        }
        #leaderboard ol {
            list-style-type: none;
            padding: 0;
            margin-top: 5px;
        }
        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 130px;
            height: 130px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        #minimap {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score-board">Score: <span id="score">0</span></div>
        <div id="leaderboard">
            <div><strong>Leaderboard</strong></div>
            <ol id="top-players">
                <!-- Top players will be populated here -->
            </ol>
        </div>
        <div id="minimap-container">
            <canvas id="minimap"></canvas>
        </div>
    </div>

    <script>
        (function() {
            // Configuration & State
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            const CONFIG = {
                MAP_RADIUS: 3000,
                HEX_SIZE: 30,
                BG_COLOR: '#0e1114',
                GRID_COLOR: '#1a2024',
                BOUNDARY_COLOR: 'rgba(255, 50, 50, 0.8)',
                BASE_SPEED: 150,
                BOOST_SPEED_MULTI: 1.5,
                TURN_SPEED: Math.PI, // radians per sec
                SNAKE_RADIUS: 15,
                SPACING: 8, // Distance between body segments
                FOOD_RADIUS: 5,
                MAX_FOOD: 500
            };

            const state = {
                camera: { x: 0, y: 0, zoom: 1 },
                player: null,
                ais: [],
                foods: [],
                mouseX: window.innerWidth / 2,
                mouseY: window.innerHeight / 2,
                isBoosting: false
            };

            class Snake {
                constructor(x, y, colorHue, name) {
                    this.x = x;
                    this.y = y;
                    this.angle = 0;
                    this.colorHue = colorHue;
                    this.name = name;
                    this.body = [];
                    // Start with some length
                    for(let i=0; i<20; i++) {
                        this.body.push({x: this.x, y: this.y});
                    }
                    this.score = 20;
                    this.isDead = false;
                }

                update(deltaTime, targetX, targetY, isBoosting) {
                    if (this.isDead) return;

                    const dtSec = deltaTime / 1000;

                    // Boost logic
                    let actualBoosting = isBoosting && this.score > 30; // Min score to boost
                    const speed = actualBoosting ? CONFIG.BASE_SPEED * CONFIG.BOOST_SPEED_MULTI : CONFIG.BASE_SPEED;

                    if (actualBoosting) {
                        // Lose mass over time
                        const massLossRate = 5; // points per sec
                        const loss = massLossRate * dtSec;
                        this.score -= loss;

                        // Accumulate loss to spawn food
                        this.boostLossAccumulator = (this.boostLossAccumulator || 0) + loss;
                        if (this.boostLossAccumulator > 1) {
                            this.boostLossAccumulator -= 1;
                            // Drop food at tail
                            if (this.bodySegments && this.bodySegments.length > 0) {
                                const tail = this.bodySegments[this.bodySegments.length - 1];
                                // Spawn food with player's color
                                spawnFood(tail.x, tail.y, this.colorHue, CONFIG.FOOD_RADIUS * 1.5);
                            }
                        }
                    }

                    // Calculate desired angle
                    let targetAngle = Math.atan2(targetY, targetX);

                    // Smoothly rotate towards target angle
                    let angleDiff = targetAngle - this.angle;
                    // Normalize angle to -PI to PI
                    while (angleDiff <= -Math.PI) angleDiff += Math.PI * 2;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

                    const maxTurn = CONFIG.TURN_SPEED * dtSec;
                    if (Math.abs(angleDiff) < maxTurn) {
                        this.angle = targetAngle;
                    } else {
                        this.angle += Math.sign(angleDiff) * maxTurn;
                    }

                    // Move head
                    this.x += Math.cos(this.angle) * speed * dtSec;
                    this.y += Math.sin(this.angle) * speed * dtSec;

                    // Boundary check (die if hitting boundary)
                    if (Math.hypot(this.x, this.y) > CONFIG.MAP_RADIUS - CONFIG.SNAKE_RADIUS) {
                        this.die();
                        return;
                    }

                    // Update body
                    let prevX = this.x;
                    let prevY = this.y;

                    // Add new position to front of history
                    this.body.unshift({x: prevX, y: prevY});

                    // We need points spaced out by CONFIG.SPACING
                    let newBody = [];
                    let currentHistIdx = 0;
                    let distanceAccumulated = 0;

                    newBody.push({x: this.x, y: this.y}); // Head

                    for (let i = 1; i < this.score; i++) {
                        let neededDistance = CONFIG.SPACING;

                        while(neededDistance > 0 && currentHistIdx < this.body.length - 1) {
                            const p1 = this.body[currentHistIdx];
                            const p2 = this.body[currentHistIdx + 1];
                            const distToNext = Math.hypot(p2.x - p1.x, p2.y - p1.y);

                            if (distanceAccumulated + distToNext >= neededDistance) {
                                // Find exact point between p1 and p2
                                const ratio = (neededDistance - distanceAccumulated) / distToNext;
                                const px = p1.x + (p2.x - p1.x) * ratio;
                                const py = p1.y + (p2.y - p1.y) * ratio;

                                newBody.push({x: px, y: py});

                                // Insert this new point into history to start next segment from here
                                this.body.splice(currentHistIdx + 1, 0, {x: px, y: py});
                                currentHistIdx++;
                                distanceAccumulated = 0;
                                neededDistance = 0; // Found it
                            } else {
                                distanceAccumulated += distToNext;
                                currentHistIdx++;
                            }
                        }
                    }

                    // Prune history to avoid memory leak
                    if (currentHistIdx < this.body.length) {
                        this.body = this.body.slice(0, currentHistIdx + 2);
                    }

                    this.bodySegments = newBody;
                }

                draw(ctx, camX, camY) {
                    if (this.isDead || !this.bodySegments) return;

                    const scaleFactor = 1 + (this.score / 100) * 0.1; // Snakes get slightly wider
                    const radius = CONFIG.SNAKE_RADIUS * scaleFactor;

                    // Draw body from tail to head
                    for (let i = this.bodySegments.length - 1; i >= 0; i--) {
                        const seg = this.bodySegments[i];
                        const sx = seg.x - camX + window.innerWidth / 2;
                        const sy = seg.y - camY + window.innerHeight / 2;

                        // Don't draw if offscreen
                        if (sx < -radius || sx > window.innerWidth + radius ||
                            sy < -radius || sy > window.innerHeight + radius) continue;

                        ctx.beginPath();
                        ctx.arc(sx, sy, radius, 0, Math.PI * 2);

                        // Glow
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsl(${this.colorHue}, 100%, 50%)`;

                        // Gradient
                        const gradient = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius);
                        if (i === 0) { // Head
                            gradient.addColorStop(0, '#fff');
                            gradient.addColorStop(1, `hsl(${this.colorHue}, 100%, 40%)`);
                        } else {
                            // Stripes logic based on index
                            const lightness = (i % 4 === 0) ? 60 : 40;
                            gradient.addColorStop(0, `hsl(${this.colorHue}, 100%, ${lightness + 10}%)`);
                            gradient.addColorStop(1, `hsl(${this.colorHue}, 100%, ${lightness - 10}%)`);
                        }

                        ctx.fillStyle = gradient;
                        ctx.fill();

                        // Reset shadow for performance
                        ctx.shadowBlur = 0;
                    }

                    // Draw eyes
                    if (this.bodySegments.length > 0) {
                        const head = this.bodySegments[0];
                        const hx = head.x - camX + window.innerWidth / 2;
                        const hy = head.y - camY + window.innerHeight / 2;

                        const eyeOffset = radius * 0.6;
                        const eyeRadius = radius * 0.3;
                        const pupilRadius = radius * 0.15;

                        const drawEye = (angleOffset) => {
                            const ex = hx + Math.cos(this.angle + angleOffset) * eyeOffset;
                            const ey = hy + Math.sin(this.angle + angleOffset) * eyeOffset;

                            // White
                            ctx.fillStyle = 'white';
                            ctx.beginPath();
                            ctx.arc(ex, ey, eyeRadius, 0, Math.PI * 2);
                            ctx.fill();

                            // Pupil
                            const px = ex + Math.cos(this.angle) * (eyeRadius * 0.5);
                            const py = ey + Math.sin(this.angle) * (eyeRadius * 0.5);
                            ctx.fillStyle = 'black';
                            ctx.beginPath();
                            ctx.arc(px, py, pupilRadius, 0, Math.PI * 2);
                            ctx.fill();
                        };

                        drawEye(Math.PI / 4);
                        drawEye(-Math.PI / 4);
                    }
                }

                die() {
                    this.isDead = true;
                    // Spawn food from body
                    if (this.bodySegments) {
                        for (let i = 0; i < this.bodySegments.length; i += 2) { // don't spawn for every segment to not flood
                            const seg = this.bodySegments[i];
                            // Spawn larger glowing food
                            spawnFood(seg.x + (Math.random()*10-5), seg.y + (Math.random()*10-5), this.colorHue, CONFIG.FOOD_RADIUS * 2);
                        }
                    }
                }
            }

            class AISnake extends Snake {
                constructor(x, y, colorHue, name) {
                    super(x, y, colorHue, name);
                    this.targetX = 0;
                    this.targetY = 0;
                    this.stateTimer = 0;
                    this.behavior = 'wander'; // wander, hunt, evade
                }

                updateAI(deltaTime, allSnakes, foods) {
                    if (this.isDead) return;

                    this.stateTimer -= deltaTime;

                    const headX = this.x;
                    const headY = this.y;
                    let targetX = 0;
                    let targetY = 0;
                    let isBoosting = false;

                    // Evade logic (prioritize avoiding boundaries and other snakes)
                    let evadeForceX = 0;
                    let evadeForceY = 0;
                    let evading = false;

                    // Avoid Boundary
                    const distToCenter = Math.hypot(headX, headY);
                    if (distToCenter > CONFIG.MAP_RADIUS - 300) {
                        evadeForceX -= headX; // vector towards center
                        evadeForceY -= headY;
                        evading = true;
                    }

                    // Avoid other snakes' bodies
                    for (let snake of allSnakes) {
                        if (snake === this || snake.isDead || !snake.bodySegments) continue;

                        for (let seg of snake.bodySegments) {
                            const dx = headX - seg.x;
                            const dy = headY - seg.y;
                            const dist = Math.hypot(dx, dy);

                            // If very close, steer away
                            if (dist < 100) {
                                evadeForceX += (dx / dist) * (100 - dist);
                                evadeForceY += (dy / dist) * (100 - dist);
                                evading = true;
                            }
                        }
                    }

                    if (evading) {
                        this.targetX = evadeForceX;
                        this.targetY = evadeForceY;
                        // Boost if really close to something
                        if (Math.hypot(evadeForceX, evadeForceY) > 50) isBoosting = true;
                    } else {
                        // Hunt or Wander
                        if (this.stateTimer <= 0) {
                            // Find nearest food
                            let nearestFood = null;
                            let minDist = 500; // view range

                            for (let food of foods) {
                                const dist = Math.hypot(food.x - headX, food.y - headY);
                                if (dist < minDist) {
                                    minDist = dist;
                                    nearestFood = food;
                                }
                            }

                            if (nearestFood) {
                                this.targetX = nearestFood.x - headX;
                                this.targetY = nearestFood.y - headY;
                                this.stateTimer = 500; // recalculate soon

                                // Boost if big food and far
                                if (nearestFood.size > CONFIG.FOOD_RADIUS && minDist > 100) {
                                    isBoosting = true;
                                }
                            } else {
                                // Wander
                                const angle = Math.random() * Math.PI * 2;
                                this.targetX = Math.cos(angle) * 200;
                                this.targetY = Math.sin(angle) * 200;
                                this.stateTimer = 2000 + Math.random() * 2000;
                            }
                        }
                    }

                    // Always normalize target
                    const tDist = Math.hypot(this.targetX, this.targetY);
                    if (tDist > 0) {
                        this.update(deltaTime, this.targetX / tDist, this.targetY / tDist, isBoosting);
                    } else {
                        this.update(deltaTime, Math.cos(this.angle), Math.sin(this.angle), isBoosting);
                    }
                }
            }

            // Resize handler
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);

            // Input handlers
            window.addEventListener('mousemove', (e) => {
                state.mouseX = e.clientX;
                state.mouseY = e.clientY;
            });
            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) state.isBoosting = true;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) state.isBoosting = false;
            });
            window.addEventListener('touchstart', (e) => {
                state.mouseX = e.touches[0].clientX;
                state.mouseY = e.touches[0].clientY;
                state.isBoosting = true;
            });
            window.addEventListener('touchmove', (e) => {
                state.mouseX = e.touches[0].clientX;
                state.mouseY = e.touches[0].clientY;
            });
            window.addEventListener('touchend', (e) => {
                state.isBoosting = false;
            });

            // Game core functions required by spec
            function init() {
                resize();
                state.player = new Snake(0, 0, Math.random() * 360, "You");

                // Initial food
                for(let i=0; i<CONFIG.MAX_FOOD; i++) {
                    spawnFood();
                }

                console.log("Game initialized");
            }

            function handleInput() {
                // Determine target based on mouse position relative to center of screen
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const dx = state.mouseX - cx;
                const dy = state.mouseY - cy;

                // We don't set player x/y directly, we let the snake update handle it based on dx/dy
                return {dx, dy};
            }

            function spawnFood(x, y, colorHue, size) {
                if (state.foods.length >= CONFIG.MAX_FOOD && !x) return; // Only limit random food

                let foodX = x;
                let foodY = y;

                if (foodX === undefined) {
                    // Random position within map
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()) * (CONFIG.MAP_RADIUS - 50);
                    foodX = Math.cos(angle) * r;
                    foodY = Math.sin(angle) * r;
                }

                state.foods.push({
                    x: foodX,
                    y: foodY,
                    hue: colorHue !== undefined ? colorHue : Math.random() * 360,
                    size: size || CONFIG.FOOD_RADIUS,
                    wobble: Math.random() * Math.PI * 2
                });
            }

            function spawnAI() {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * (CONFIG.MAP_RADIUS - 200);
                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r;
                const ai = new AISnake(x, y, Math.random() * 360, "AI_" + Math.floor(Math.random() * 1000));

                // Give AI random starting length
                ai.score = 20 + Math.random() * 200;

                state.ais.push(ai);
            }

            // Centralized collision detection
            function checkCollisions(allSnakes) {
                // Check head-to-body collisions
                for (let i = 0; i < allSnakes.length; i++) {
                    const snake1 = allSnakes[i];
                    if (snake1.isDead) continue;

                    const head1 = {x: snake1.x, y: snake1.y};
                    const radius1 = CONFIG.SNAKE_RADIUS * (1 + (snake1.score / 100) * 0.1);

                    for (let j = 0; j < allSnakes.length; j++) {
                        if (i === j) continue; // Don't check against self

                        const snake2 = allSnakes[j];
                        if (snake2.isDead || !snake2.bodySegments) continue;

                        const radius2 = CONFIG.SNAKE_RADIUS * (1 + (snake2.score / 100) * 0.1);
                        const collisionDist = radius1 + radius2 * 0.8; // slightly forgiving

                        // Start from index 3 or 4 to prevent head-to-head immediately triggering if they spawn close
                        for (let k = 3; k < snake2.bodySegments.length; k++) {
                            const seg2 = snake2.bodySegments[k];

                            if (Math.hypot(head1.x - seg2.x, head1.y - seg2.y) < collisionDist) {
                                snake1.die();
                                break;
                            }
                        }
                    }
                }
            }

            function handleEating(snake) {
                if (snake.isDead) return;

                const headX = snake.x;
                const headY = snake.y;
                const eatRadius = CONFIG.SNAKE_RADIUS * (1 + (snake.score / 100) * 0.1) + 10;

                for (let i = state.foods.length - 1; i >= 0; i--) {
                    const food = state.foods[i];
                    const dist = Math.hypot(food.x - headX, food.y - headY);

                    if (dist < eatRadius) {
                        // Eat it
                        snake.score += (food.size === CONFIG.FOOD_RADIUS) ? 1 : 5; // bigger food = more score
                        state.foods.splice(i, 1);

                        // Spawn replacement if it was random food
                        if (state.foods.length < CONFIG.MAX_FOOD) {
                            spawnFood();
                        }
                    }
                }
            }

            function update(deltaTime) {
                const {dx, dy} = handleInput();

                let allActiveSnakes = [];
                if (state.player && !state.player.isDead) allActiveSnakes.push(state.player);
                for (let ai of state.ais) {
                    if (!ai.isDead) allActiveSnakes.push(ai);
                }

                // Update Player
                if (state.player && !state.player.isDead) {
                    state.player.update(deltaTime, dx, dy, state.isBoosting);

                    // Smooth camera follow
                    state.camera.x += (state.player.x - state.camera.x) * 0.1;
                    state.camera.y += (state.player.y - state.camera.y) * 0.1;

                    // Update UI Score
                    document.getElementById('score').innerText = Math.floor(state.player.score);

                    handleEating(state.player);
                } else if (state.player && state.player.isDead) {
                     document.getElementById('score').innerText = "Game Over - Refresh to restart";
                }

                // Update AI
                for (let i = state.ais.length - 1; i >= 0; i--) {
                    const ai = state.ais[i];
                    if (!ai.isDead) {
                        ai.updateAI(deltaTime, allActiveSnakes, state.foods);
                        handleEating(ai);
                    } else {
                        // AI Respawn logic
                        if (!ai.deathTime) ai.deathTime = performance.now();
                        if (performance.now() - ai.deathTime > 10000) { // 10 seconds
                            state.ais.splice(i, 1);
                            spawnAI(); // Respawn a new one
                        }
                    }
                }

                // Initial AI population
                while (state.ais.length < 15) {
                    spawnAI();
                }

                // Check all collisions
                checkCollisions(allActiveSnakes);

                // Update food wobble
                const timeSec = performance.now() / 1000;
                for (let food of state.foods) {
                    food.currentWobble = Math.sin(timeSec * 5 + food.wobble) * 2;
                }
            }

            function drawFoods(ctx, camX, camY) {
                for (let food of state.foods) {
                    const sx = food.x - camX + window.innerWidth / 2;
                    const sy = food.y - camY + window.innerHeight / 2;

                    // Frustum culling
                    if (sx < -20 || sx > window.innerWidth + 20 ||
                        sy < -20 || sy > window.innerHeight + 20) continue;

                    ctx.beginPath();
                    // Give food a slight pulsing effect
                    const radius = food.size + (food.currentWobble || 0);
                    ctx.arc(sx, sy, Math.max(2, radius), 0, Math.PI * 2);

                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsl(${food.hue}, 100%, 50%)`;

                    ctx.fillStyle = `hsl(${food.hue}, 100%, 70%)`;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            function drawMinimap(ctxMinimap, player, ais, foods) {
                const w = ctxMinimap.canvas.width;
                const h = ctxMinimap.canvas.height;
                const r = w / 2;

                ctxMinimap.clearRect(0, 0, w, h);

                // Draw map boundary
                ctxMinimap.beginPath();
                ctxMinimap.arc(r, r, r, 0, Math.PI * 2);
                ctxMinimap.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctxMinimap.fill();

                const mapScale = r / CONFIG.MAP_RADIUS;

                // Draw foods (just small dots)
                ctxMinimap.fillStyle = 'rgba(255, 255, 255, 0.3)';
                for(let food of foods) {
                    // skip drawing all foods on minimap to save perf, draw maybe every 10th
                    if(Math.random() > 0.1) continue;
                    const mx = r + food.x * mapScale;
                    const my = r + food.y * mapScale;
                    ctxMinimap.fillRect(mx, my, 1, 1);
                }

                // Draw AIs
                for (let ai of ais) {
                    if (ai.isDead) continue;
                    const px = r + ai.x * mapScale;
                    const py = r + ai.y * mapScale;
                    ctxMinimap.beginPath();
                    ctxMinimap.arc(px, py, 2, 0, Math.PI * 2);
                    ctxMinimap.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctxMinimap.fill();
                }

                // Draw player
                if (player && !player.isDead) {
                    const px = r + player.x * mapScale;
                    const py = r + player.y * mapScale;
                    ctxMinimap.beginPath();
                    ctxMinimap.arc(px, py, 3, 0, Math.PI * 2);
                    ctxMinimap.fillStyle = '#fff';
                    ctxMinimap.fill();
                }
            }

            function drawHexagons(ctx, camX, camY, canvasWidth, canvasHeight, hexSize) {
                const hexHeight = hexSize * Math.sqrt(3);
                const hexWidth = hexSize * 2;
                const horizSpacing = hexWidth * 0.75;
                const vertSpacing = hexHeight;

                const left = camX - canvasWidth / 2;
                const right = camX + canvasWidth / 2;
                const top = camY - canvasHeight / 2;
                const bottom = camY + canvasHeight / 2;

                const startCol = Math.floor(left / horizSpacing) - 1;
                const endCol = Math.ceil(right / horizSpacing) + 1;

                ctx.beginPath();
                for (let col = startCol; col <= endCol; col++) {
                    const x = col * horizSpacing;
                    const offset = (col % 2 !== 0) ? vertSpacing / 2 : 0;

                    const startRow = Math.floor((top - offset) / vertSpacing) - 1;
                    const endRow = Math.ceil((bottom - offset) / vertSpacing) + 1;

                    for (let row = startRow; row <= endRow; row++) {
                        const y = row * vertSpacing + offset;

                        // Screen coordinates
                        const sx = x - left;
                        const sy = y - top;

                        ctx.moveTo(sx + hexSize, sy);
                        ctx.lineTo(sx + hexSize / 2, sy + hexHeight / 2);
                        ctx.lineTo(sx - hexSize / 2, sy + hexHeight / 2);
                        ctx.lineTo(sx - hexSize, sy);
                        ctx.lineTo(sx - hexSize / 2, sy - hexHeight / 2);
                        ctx.lineTo(sx + hexSize / 2, sy - hexHeight / 2);
                        ctx.lineTo(sx + hexSize, sy);
                    }
                }
                ctx.strokeStyle = CONFIG.GRID_COLOR;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            function drawBoundary(ctx, camX, camY, canvasWidth, canvasHeight, radius) {
                const cx = -camX + canvasWidth / 2;
                const cy = -camY + canvasHeight / 2;

                // Draw red boundary line
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = CONFIG.BOUNDARY_COLOR;
                ctx.lineWidth = 10;
                ctx.stroke();

                // Darken outside area using evenodd rule
                ctx.beginPath();
                // Outer large rectangle
                ctx.rect(0, 0, canvasWidth, canvasHeight);
                // Inner map circle
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fill('evenodd');
            }

            function updateLeaderboard() {
                const list = document.getElementById('top-players');
                list.innerHTML = '';

                // Combine player and AIs
                let entities = [];
                if (state.player && !state.player.isDead) entities.push(state.player);
                for (let ai of state.ais) {
                    if (!ai.isDead) entities.push(ai);
                }

                entities.sort((a, b) => b.score - a.score);

                for(let i=0; i < Math.min(3, entities.length); i++) {
                    const li = document.createElement('li');
                    const isPlayer = entities[i] === state.player;
                    li.innerHTML = `<span style="color: ${isPlayer ? '#ffff00' : '#fff'}">#${i+1} ${entities[i].name} - ${Math.floor(entities[i].score)}</span>`;
                    list.appendChild(li);
                }
            }

            function render() {
                // Clear background
                ctx.fillStyle = CONFIG.BG_COLOR;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw map features
                drawHexagons(ctx, state.camera.x, state.camera.y, canvas.width, canvas.height, CONFIG.HEX_SIZE);
                drawBoundary(ctx, state.camera.x, state.camera.y, canvas.width, canvas.height, CONFIG.MAP_RADIUS);

                // Draw foods
                drawFoods(ctx, state.camera.x, state.camera.y);

                // Draw AIs
                for (let ai of state.ais) {
                    ai.draw(ctx, state.camera.x, state.camera.y);
                }

                // Draw player
                if (state.player) {
                    state.player.draw(ctx, state.camera.x, state.camera.y);
                }

                // Draw Minimap
                const minimapCanvas = document.getElementById('minimap');
                minimapCanvas.width = document.getElementById('minimap-container').clientWidth;
                minimapCanvas.height = document.getElementById('minimap-container').clientHeight;
                const ctxMinimap = minimapCanvas.getContext('2d');
                drawMinimap(ctxMinimap, state.player, state.ais, state.foods);

                // Leaderboard
                updateLeaderboard();
            }

            // Main game loop
            let lastTime = 0;
            function gameLoop(timestamp) {
                const deltaTime = timestamp - lastTime || 0;
                lastTime = timestamp;

                // Max delta time to prevent large jumps when tab is inactive
                if (deltaTime < 100) {
                    handleInput();
                    update(deltaTime);
                    render();
                }

                requestAnimationFrame(gameLoop);
            }

            // Bootstrap
            init();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
