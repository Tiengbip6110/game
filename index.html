<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>slither.io</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0e1114;
            font-family: Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI Layers */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        /* Interactive Overlay Elements */
        .interactive {
            pointer-events: auto;
        }

        /* --- Menu Screen --- */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(14, 17, 20, 0.5); /* Dimmed background */
            z-index: 20;
        }
        #menu-title {
            font-size: 80px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #0f0, 2px 2px 5px #000;
            margin-bottom: 5px;
        }
        #menu-subtitle {
            font-size: 20px;
            color: #ccc;
            margin-bottom: 30px;
        }
        #nickname-input {
            width: 300px;
            padding: 15px;
            font-size: 20px;
            border: 2px solid #555;
            border-radius: 25px;
            background-color: #222;
            color: white;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px #000;
        }
        #nickname-input:focus {
            border-color: #0f0;
        }
        #play-btn {
            background-color: #4CAF50;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 50px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        #play-btn:active {
            transform: scale(0.95);
        }
        #highscore-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            color: #ffeb3b;
        }

        /* --- In-Game UI --- */
        #in-game-ui {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        #top-left-info {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 14px; /* Reduced from 18px */
            font-weight: bold;
        }
        #player-name-display {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 20px; /* Reduced from 24px */
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
        }
        #server-info {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 12px; /* Reduced from 16px */
            color: #aaa;
        }

        #leaderboard-panel {
            position: absolute;
            top: 30px;
            right: 20px;
            width: 110px; /* Reduced from 220px */
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 8px;
            font-size: 12px; /* Reduced from 16px */
        }
        #leaderboard-panel h3 {
            margin: 0 0 8px 0;
            text-align: center;
            font-size: 14px; /* Reduced from 18px */
            color: #fff;
        }
        #leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #leaderboard-list li {
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .lb-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px; /* Reduced to fit smaller width */
        }

        #minimap-container {
            position: absolute;
            bottom: 60px;
            right: 20px;
            width: 60px; /* Reduced from 120px */
            height: 60px; /* Reduced from 120px */
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
        }
        #minimap {
            width: 100%;
            height: 100%;
        }

        /* --- Game Over Screen --- */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 30;
        }
        #game-over-title {
            font-size: 60px;
            font-weight: bold;
            color: #ff3333;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #f00;
        }
        #final-score {
            font-size: 30px;
            color: white;
            margin-bottom: 40px;
        }
        .btn-group {
            display: flex;
            gap: 20px;
        }
        .go-btn {
            background-color: #555;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }
        .go-btn.primary {
            background-color: #4CAF50;
        }
        .go-btn:active {
            transform: scale(0.95);
        }

        /* --- Common Bottom Text --- */
        #bottom-text {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #888;
            z-index: 40;
        }
        #bottom-text a {
            color: #4CAF50;
            text-decoration: none;
            cursor: pointer;
            pointer-events: auto;
        }

        #small-logo {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
            z-index: 40;
        }
    </style>
</head>
<body>
    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-layer">

        <!-- Minimap -->
        <div id="minimap-container" style="display: none;">
            <canvas id="minimap"></canvas>
        </div>

        <!-- Common Elements -->
        <div id="small-logo">slither.io</div>
        <div id="bottom-text">
            The website might not work well on your device, so <a id="fake-app-link" class="interactive">Tap here to download the app!</a>
        </div>

        <!-- Menu Screen -->
        <div id="menu-screen" class="interactive">
            <div id="highscore-display">Your High Score: <span id="hs-val">0</span></div>
            <div id="menu-title">slither.io</div>
            <div id="menu-subtitle">Eat to grow longer!</div>
            <input type="text" id="nickname-input" placeholder="Nickname" maxlength="24">
            <button id="play-btn">Play</button>
        </div>

        <!-- In-Game UI -->
        <div id="in-game-ui">
            <div id="top-left-info">
                Your length: <span id="ui-length">0</span><br>
                Your rank: <span id="ui-rank">0</span> of <span id="ui-total">0</span>
            </div>
            <div id="player-name-display">Name</div>
            <div id="server-info">server <span id="server-id">0000</span></div>

            <div id="leaderboard-panel">
                <h3>Leaderboard</h3>
                <ul id="leaderboard-list">
                    <!-- populated dynamically -->
                </ul>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="interactive">
            <div id="game-over-title">YOU DIED</div>
            <div id="final-score">Final Length: <span id="go-score">0</span></div>
            <div class="btn-group">
                <button id="btn-menu" class="go-btn">BACK TO MENU</button>
                <button id="btn-play-again" class="go-btn primary">PLAY AGAIN</button>
            </div>
        </div>

    </div>

    <script>
        (function() {
            // --- CONSTANTS & CONFIG ---
            const CONFIG = {
                MAP_RADIUS: 4000,
                HEX_SIZE: 40,
                BG_COLOR: '#0e1114',
                GRID_COLOR: '#1a2024',
                BOUNDARY_COLOR: 'rgba(255, 50, 50, 0.4)',
                BASE_SPEED: 180,
                BOOST_SPEED_MULTI: 1.8,
                TURN_SPEED: Math.PI * 1.5,
                SNAKE_RADIUS: 16,
                SPACING: 12, // Increased spacing to reduce segment count
                FOOD_RADIUS: 6,
                MAX_FOOD: 600, // Reduced slightly to save performance
                AI_COUNT: 15,
                DEFAULT_NAME: "FreeBabysittingCallTrump"
            };

            const AI_COLORS = [0, 30, 300, 270]; // Red, Orange, Pink, Purple (HSL hues)
            const PLAYER_HUE = 120; // Neon Green

            // --- GAME STATE ---
            const state = {
                phase: 'MENU', // MENU, PLAYING, GAMEOVER
                camera: { x: 0, y: 0, zoom: 1 },
                player: null,
                ais: [],
                foods: [],
                mouseX: window.innerWidth / 2,
                mouseY: window.innerHeight / 2,
                isBoosting: false,
                highScore: parseInt(localStorage.getItem('slitherHighScore')) || 0,
                serverId: Math.floor(1000 + Math.random() * 9000),
                nickname: CONFIG.DEFAULT_NAME
            };

            // --- DOM ELEMENTS ---
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d', { alpha: false });
            const minimapCanvas = document.getElementById('minimap');
            const ctxMinimap = minimapCanvas.getContext('2d');

            const screens = {
                menu: document.getElementById('menu-screen'),
                inGame: document.getElementById('in-game-ui'),
                gameOver: document.getElementById('game-over-screen'),
                minimap: document.getElementById('minimap-container')
            };

            // --- UI HANDLERS ---
            document.getElementById('hs-val').innerText = state.highScore;
            document.getElementById('server-id').innerText = state.serverId;

            document.getElementById('fake-app-link').addEventListener('click', () => {
                alert("App demo offline");
            });

            function setPhase(newPhase) {
                state.phase = newPhase;
                screens.menu.style.display = 'none';
                screens.inGame.style.display = 'none';
                screens.gameOver.style.display = 'none';
                screens.minimap.style.display = 'none';

                if (newPhase === 'MENU') {
                    screens.menu.style.display = 'flex';
                    // Optional: reset camera to center to watch map
                    state.camera.x = 0; state.camera.y = 0;
                } else if (newPhase === 'PLAYING') {
                    screens.inGame.style.display = 'block';
                    screens.minimap.style.display = 'block';
                } else if (newPhase === 'GAMEOVER') {
                    screens.gameOver.style.display = 'flex';
                    screens.minimap.style.display = 'block';
                    document.getElementById('go-score').innerText = Math.floor(state.player.score);

                    if (state.player.score > state.highScore) {
                        state.highScore = Math.floor(state.player.score);
                        localStorage.setItem('slitherHighScore', state.highScore);
                        document.getElementById('hs-val').innerText = state.highScore;
                    }
                }
            }

            function startGame() {
                let inputName = document.getElementById('nickname-input').value.trim();
                state.nickname = inputName || CONFIG.DEFAULT_NAME;
                document.getElementById('player-name-display').innerText = state.nickname;

                // Clear state
                state.ais = [];
                state.foods = [];

                // Initial food
                for(let i=0; i<CONFIG.MAX_FOOD; i++) spawnFood();

                // Spawn Player
                state.player = new Snake(0, 0, PLAYER_HUE, state.nickname, true);

                // Spawn AIs
                for(let i=0; i<CONFIG.AI_COUNT; i++) spawnAI();

                setPhase('PLAYING');
            }

            document.getElementById('play-btn').addEventListener('click', startGame);
            document.getElementById('btn-play-again').addEventListener('click', startGame);
            document.getElementById('btn-menu').addEventListener('click', () => {
                setPhase('MENU');
            });

            // --- INPUT ---
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                state.mouseX = e.clientX;
                state.mouseY = e.clientY;
            });
            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) state.isBoosting = true;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) state.isBoosting = false;
            });
            window.addEventListener('touchstart', (e) => {
                state.mouseX = e.touches[0].clientX;
                state.mouseY = e.touches[0].clientY;
                state.isBoosting = true;
            });
            window.addEventListener('touchmove', (e) => {
                state.mouseX = e.touches[0].clientX;
                state.mouseY = e.touches[0].clientY;
            });
            window.addEventListener('touchend', (e) => {
                state.isBoosting = false;
            });

            // --- CLASSES ---
            class Snake {
                constructor(x, y, colorHue, name, isPlayer = false) {
                    this.x = x;
                    this.y = y;
                    this.angle = Math.random() * Math.PI * 2;
                    this.colorHue = colorHue;
                    this.name = name;
                    this.isPlayer = isPlayer;
                    this.body = [];
                    for(let i=0; i<20; i++) this.body.push({x: this.x, y: this.y});
                    this.score = 20;
                    this.isDead = false;
                }

                update(deltaTime, targetX, targetY, isBoosting) {
                    if (this.isDead) return;

                    const dtSec = deltaTime / 1000;

                    // Boost logic
                    let actualBoosting = isBoosting && this.score > 30;
                    const speed = actualBoosting ? CONFIG.BASE_SPEED * CONFIG.BOOST_SPEED_MULTI : CONFIG.BASE_SPEED;

                    if (actualBoosting) {
                        const loss = 5 * dtSec;
                        this.score -= loss;
                        this.boostLossAccumulator = (this.boostLossAccumulator || 0) + loss;
                        if (this.boostLossAccumulator > 1) {
                            this.boostLossAccumulator -= 1;
                            if (this.bodySegments && this.bodySegments.length > 0) {
                                const tail = this.bodySegments[this.bodySegments.length - 1];
                                spawnFood(tail.x, tail.y, this.colorHue, CONFIG.FOOD_RADIUS * 1.5);
                            }
                        }
                    }

                    // Turning
                    let targetAngle = Math.atan2(targetY, targetX);
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff <= -Math.PI) angleDiff += Math.PI * 2;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

                    const maxTurn = CONFIG.TURN_SPEED * dtSec;
                    if (Math.abs(angleDiff) < maxTurn) {
                        this.angle = targetAngle;
                    } else {
                        this.angle += Math.sign(angleDiff) * maxTurn;
                    }

                    // Move
                    this.x += Math.cos(this.angle) * speed * dtSec;
                    this.y += Math.sin(this.angle) * speed * dtSec;

                    // Boundary check
                    if (Math.hypot(this.x, this.y) > CONFIG.MAP_RADIUS - CONFIG.SNAKE_RADIUS) {
                        this.die();
                        return;
                    }

                    // Body update
                    this.body.unshift({x: this.x, y: this.y});

                    let newBody = [];
                    let currentHistIdx = 0;
                    let distanceAccumulated = 0;
                    newBody.push({x: this.x, y: this.y});

                    // Optimize: Don't make 1 score = 1 segment.
                    // Scale segments down significantly so the game doesn't crash when score gets high
                    const targetSegments = Math.floor(10 + this.score / 15);

                    for (let i = 1; i < targetSegments; i++) {
                        let neededDistance = CONFIG.SPACING;
                        while(neededDistance > 0 && currentHistIdx < this.body.length - 1) {
                            const p1 = this.body[currentHistIdx];
                            const p2 = this.body[currentHistIdx + 1];
                            const distToNext = Math.hypot(p2.x - p1.x, p2.y - p1.y);

                            if (distanceAccumulated + distToNext >= neededDistance) {
                                const ratio = (neededDistance - distanceAccumulated) / distToNext;
                                const px = p1.x + (p2.x - p1.x) * ratio;
                                const py = p1.y + (p2.y - p1.y) * ratio;
                                newBody.push({x: px, y: py});
                                this.body.splice(currentHistIdx + 1, 0, {x: px, y: py});
                                currentHistIdx++;
                                distanceAccumulated = 0;
                                neededDistance = 0;
                            } else {
                                distanceAccumulated += distToNext;
                                currentHistIdx++;
                            }
                        }
                    }

                    if (currentHistIdx < this.body.length) {
                        this.body = this.body.slice(0, currentHistIdx + 2);
                    }
                    this.bodySegments = newBody;
                }

                draw(ctx, camX, camY) {
                    if (this.isDead || !this.bodySegments) return;

                    const scaleFactor = 1 + (this.score / 500) * 0.1;
                    const radius = CONFIG.SNAKE_RADIUS * scaleFactor;

                    for (let i = this.bodySegments.length - 1; i >= 0; i--) {
                        const seg = this.bodySegments[i];
                        const sx = seg.x - camX + window.innerWidth / 2;
                        const sy = seg.y - camY + window.innerHeight / 2;

                        if (sx < -radius || sx > window.innerWidth + radius ||
                            sy < -radius || sy > window.innerHeight + radius) continue;

                        ctx.beginPath();
                        ctx.arc(sx, sy, radius, 0, Math.PI * 2);

                        // Optimize: Removed heavy shadowBlur and createRadialGradient
                        if (i === 0) {
                            ctx.fillStyle = `hsl(${this.colorHue}, 100%, 60%)`;
                        } else {
                            const lightness = (i % 4 === 0) ? 60 : 40;
                            ctx.fillStyle = `hsl(${this.colorHue}, 100%, ${lightness}%)`;
                        }
                        ctx.fill();

                        // Add a simple stroke to give depth without expensive gradients
                        ctx.lineWidth = 1;
                        ctx.strokeStyle = `hsl(${this.colorHue}, 100%, 20%)`;
                        ctx.stroke();
                    }

                    // Eyes
                    if (this.bodySegments.length > 0) {
                        const hx = this.bodySegments[0].x - camX + window.innerWidth / 2;
                        const hy = this.bodySegments[0].y - camY + window.innerHeight / 2;
                        const eyeOffset = radius * 0.6;
                        const eyeRadius = radius * 0.3;
                        const pupilRadius = radius * 0.15;

                        const drawEye = (angleOffset) => {
                            const ex = hx + Math.cos(this.angle + angleOffset) * eyeOffset;
                            const ey = hy + Math.sin(this.angle + angleOffset) * eyeOffset;
                            ctx.fillStyle = 'white';
                            ctx.beginPath(); ctx.arc(ex, ey, eyeRadius, 0, Math.PI*2); ctx.fill();
                            const px = ex + Math.cos(this.angle) * (eyeRadius * 0.5);
                            const py = ey + Math.sin(this.angle) * (eyeRadius * 0.5);
                            ctx.fillStyle = 'black';
                            ctx.beginPath(); ctx.arc(px, py, pupilRadius, 0, Math.PI*2); ctx.fill();
                        };
                        drawEye(Math.PI / 4);
                        drawEye(-Math.PI / 4);

                        // Draw Name Above Head
                        ctx.fillStyle = 'white';
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = 3;
                        ctx.font = '14px Arial';
                        ctx.textAlign = 'center';
                        ctx.strokeText(this.name, hx, hy - radius - 10);
                        ctx.fillText(this.name, hx, hy - radius - 10);
                    }
                }

                die() {
                    this.isDead = true;
                    if (this.bodySegments) {
                        for (let i = 0; i < this.bodySegments.length; i += 2) {
                            const seg = this.bodySegments[i];
                            spawnFood(seg.x + (Math.random()*10-5), seg.y + (Math.random()*10-5), this.colorHue, CONFIG.FOOD_RADIUS * 2);
                        }
                    }
                    if (this.isPlayer) {
                        setPhase('GAMEOVER');
                    }
                }
            }

            class AISnake extends Snake {
                constructor(x, y, colorHue, name) {
                    super(x, y, colorHue, name, false);
                    this.targetX = 0;
                    this.targetY = 0;
                    this.stateTimer = 0;
                }

                updateAI(deltaTime, allSnakes, foods) {
                    if (this.isDead) return;

                    this.stateTimer -= deltaTime;
                    let targetX = 0, targetY = 0, isBoosting = false;
                    let evading = false, evadeForceX = 0, evadeForceY = 0;

                    // Avoid boundary
                    if (Math.hypot(this.x, this.y) > CONFIG.MAP_RADIUS - 300) {
                        evadeForceX -= this.x; evadeForceY -= this.y; evading = true;
                    }

                    // Avoid other bodies
                    for (let s of allSnakes) {
                        if (s === this || s.isDead || !s.bodySegments) continue;
                        for (let seg of s.bodySegments) {
                            const dx = this.x - seg.x, dy = this.y - seg.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist < 100) {
                                evadeForceX += (dx/dist)*(100-dist); evadeForceY += (dy/dist)*(100-dist); evading = true;
                            }
                        }
                    }

                    if (evading) {
                        this.targetX = evadeForceX; this.targetY = evadeForceY;
                        if (Math.hypot(evadeForceX, evadeForceY) > 50) isBoosting = true;
                    } else {
                        if (this.stateTimer <= 0) {
                            let nearestFood = null, minDist = 500;
                            for (let f of foods) {
                                const d = Math.hypot(f.x - this.x, f.y - this.y);
                                if (d < minDist) { minDist = d; nearestFood = f; }
                            }
                            if (nearestFood) {
                                this.targetX = nearestFood.x - this.x; this.targetY = nearestFood.y - this.y;
                                this.stateTimer = 500;
                                if (nearestFood.size > CONFIG.FOOD_RADIUS && minDist > 100) isBoosting = true;
                            } else {
                                const a = Math.random() * Math.PI * 2;
                                this.targetX = Math.cos(a)*200; this.targetY = Math.sin(a)*200;
                                this.stateTimer = 2000 + Math.random()*2000;
                            }
                        }
                    }

                    const tDist = Math.hypot(this.targetX, this.targetY);
                    if (tDist > 0) this.update(deltaTime, this.targetX/tDist, this.targetY/tDist, isBoosting);
                    else this.update(deltaTime, Math.cos(this.angle), Math.sin(this.angle), isBoosting);
                }
            }

            // --- ENGINE FUNCTIONS ---
            function spawnFood(x, y, colorHue, size) {
                if (state.foods.length >= CONFIG.MAX_FOOD && x === undefined) return;
                let fX = x, fY = y;
                if (fX === undefined) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()) * (CONFIG.MAP_RADIUS - 50);
                    fX = Math.cos(angle) * r; fY = Math.sin(angle) * r;
                }
                state.foods.push({
                    x: fX, y: fY,
                    hue: colorHue !== undefined ? colorHue : Math.random() * 360,
                    size: size || CONFIG.FOOD_RADIUS,
                    wobble: Math.random() * Math.PI * 2
                });
            }

            function spawnAI() {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * (CONFIG.MAP_RADIUS - 200);
                const hue = AI_COLORS[Math.floor(Math.random() * AI_COLORS.length)];
                const names = ["Bot_Gamer", "SlitherPro", "SnakeEater", "Noob123", "Venom", "DangerNoodle"];
                const ai = new AISnake(Math.cos(angle)*r, Math.sin(angle)*r, hue, names[Math.floor(Math.random()*names.length)]);
                ai.score = 20 + Math.random() * 300;
                state.ais.push(ai);
            }

            function checkCollisions(allSnakes) {
                for (let i = 0; i < allSnakes.length; i++) {
                    const s1 = allSnakes[i];
                    if (s1.isDead) continue;
                    const h1 = {x: s1.x, y: s1.y};
                    const r1 = CONFIG.SNAKE_RADIUS * (1 + (s1.score/200)*0.1);

                    for (let j = 0; j < allSnakes.length; j++) {
                        if (i === j) continue; // NEVER die from own body
                        const s2 = allSnakes[j];
                        if (s2.isDead || !s2.bodySegments) continue;
                        const r2 = CONFIG.SNAKE_RADIUS * (1 + (s2.score/200)*0.1);
                        const cDist = r1 + r2 * 0.8;

                        for (let k = 3; k < s2.bodySegments.length; k++) {
                            if (Math.hypot(h1.x - s2.bodySegments[k].x, h1.y - s2.bodySegments[k].y) < cDist) {
                                s1.die();
                                break;
                            }
                        }
                    }
                }
            }

            function handleEating(snake) {
                if (snake.isDead) return;
                const r = CONFIG.SNAKE_RADIUS * (1 + (snake.score/200)*0.1) + 10;
                for (let i = state.foods.length - 1; i >= 0; i--) {
                    const f = state.foods[i];
                    if (Math.hypot(f.x - snake.x, f.y - snake.y) < r) {
                        snake.score += (f.size === CONFIG.FOOD_RADIUS) ? 1 : 5;
                        state.foods.splice(i, 1);
                        if (state.foods.length < CONFIG.MAX_FOOD) spawnFood();
                    }
                }
            }

            function update(deltaTime) {
                // If in menu, let's just make camera slowly drift
                if (state.phase === 'MENU') {
                    state.camera.x += 20 * (deltaTime/1000);
                    state.camera.y += 10 * (deltaTime/1000);
                    // Update food wobble in menu too
                    const timeSec = performance.now() / 1000;
                    for (let f of state.foods) f.currentWobble = Math.sin(timeSec*5 + f.wobble)*2;
                    return; // Don't process game logic
                }

                if (state.phase !== 'PLAYING') return;

                const cx = canvas.width / 2, cy = canvas.height / 2;
                const dx = state.mouseX - cx, dy = state.mouseY - cy;

                let activeSnakes = [];
                if (state.player && !state.player.isDead) activeSnakes.push(state.player);
                for (let ai of state.ais) if (!ai.isDead) activeSnakes.push(ai);

                // Player Update
                if (state.player && !state.player.isDead) {
                    state.player.update(deltaTime, dx, dy, state.isBoosting);
                    state.camera.x += (state.player.x - state.camera.x) * 0.1;
                    state.camera.y += (state.player.y - state.camera.y) * 0.1;
                    handleEating(state.player);
                }

                // AI Update
                for (let i = state.ais.length - 1; i >= 0; i--) {
                    const ai = state.ais[i];
                    if (!ai.isDead) {
                        ai.updateAI(deltaTime, activeSnakes, state.foods);
                        handleEating(ai);
                    } else {
                        if (!ai.deathTime) ai.deathTime = performance.now();
                        if (performance.now() - ai.deathTime > 7000) {
                            state.ais.splice(i, 1);
                            spawnAI();
                        }
                    }
                }
                while (state.ais.length < CONFIG.AI_COUNT) spawnAI();

                checkCollisions(activeSnakes);

                const timeSec = performance.now() / 1000;
                for (let f of state.foods) f.currentWobble = Math.sin(timeSec*5 + f.wobble)*2;

                updateUI(activeSnakes);
            }

            function updateUI(activeSnakes) {
                if (state.player && !state.player.isDead) {
                    document.getElementById('ui-length').innerText = Math.floor(state.player.score);
                }

                // Sort for rank
                activeSnakes.sort((a,b) => b.score - a.score);

                if (state.player && !state.player.isDead) {
                    const rank = activeSnakes.indexOf(state.player) + 1;
                    document.getElementById('ui-rank').innerText = rank;
                    document.getElementById('ui-total').innerText = activeSnakes.length;
                }

                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                for(let i=0; i<Math.min(5, activeSnakes.length); i++) {
                    const s = activeSnakes[i];
                    const li = document.createElement('li');
                    const color = s === state.player ? '#ffff00' : '#fff';
                    li.innerHTML = `<span style="color: ${color}">#${i+1}</span> <span class="lb-name" style="color: ${color}">${s.name}</span> <span style="color: ${color}">${Math.floor(s.score)}</span>`;
                    list.appendChild(li);
                }
            }

            function drawHexagons(ctx, camX, camY) {
                const hSize = CONFIG.HEX_SIZE;
                const hexH = hSize * Math.sqrt(3), hexW = hSize * 2;
                const hSpace = hexW * 0.75, vSpace = hexH;
                const left = camX - canvas.width/2, right = camX + canvas.width/2;
                const top = camY - canvas.height/2, bottom = camY + canvas.height/2;

                const startCol = Math.floor(left/hSpace)-1, endCol = Math.ceil(right/hSpace)+1;

                ctx.beginPath();
                for (let col = startCol; col <= endCol; col++) {
                    const x = col * hSpace;
                    const offset = (col%2 !== 0) ? vSpace/2 : 0;
                    const startRow = Math.floor((top-offset)/vSpace)-1, endRow = Math.ceil((bottom-offset)/vSpace)+1;

                    for (let row = startRow; row <= endRow; row++) {
                        const y = row * vSpace + offset;
                        const sx = x - left, sy = y - top;
                        ctx.moveTo(sx+hSize, sy); ctx.lineTo(sx+hSize/2, sy+hexH/2);
                        ctx.lineTo(sx-hSize/2, sy+hexH/2); ctx.lineTo(sx-hSize, sy);
                        ctx.lineTo(sx-hSize/2, sy-hexH/2); ctx.lineTo(sx+hSize/2, sy-hexH/2);
                        ctx.lineTo(sx+hSize, sy);
                    }
                }
                ctx.strokeStyle = CONFIG.GRID_COLOR; ctx.lineWidth = 1; ctx.stroke();
            }

            function render() {
                ctx.fillStyle = CONFIG.BG_COLOR;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawHexagons(ctx, state.camera.x, state.camera.y);

                // Draw Boundary
                const cx = -state.camera.x + canvas.width/2, cy = -state.camera.y + canvas.height/2;
                ctx.beginPath(); ctx.arc(cx, cy, CONFIG.MAP_RADIUS, 0, Math.PI*2);
                ctx.strokeStyle = CONFIG.BOUNDARY_COLOR; ctx.lineWidth = 15; ctx.stroke();
                ctx.beginPath(); ctx.rect(0,0,canvas.width,canvas.height); ctx.arc(cx,cy,CONFIG.MAP_RADIUS,0,Math.PI*2);
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fill('evenodd');

                // Draw Foods
                for (let f of state.foods) {
                    const sx = f.x - state.camera.x + canvas.width/2, sy = f.y - state.camera.y + canvas.height/2;
                    if (sx < -20 || sx > canvas.width+20 || sy < -20 || sy > canvas.height+20) continue;
                    const r = Math.max(2, f.size + (f.currentWobble||0));

                    // Optimize: Removed shadowBlur. Used two overlapping circles for a glow effect.
                    ctx.beginPath(); ctx.arc(sx, sy, r * 1.5, 0, Math.PI*2);
                    ctx.fillStyle = `hsla(${f.hue}, 100%, 50%, 0.3)`; ctx.fill();

                    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
                    ctx.fillStyle = `hsl(${f.hue}, 100%, 70%)`; ctx.fill();
                }

                // Draw Snakes
                if (state.phase !== 'MENU') {
                    for (let ai of state.ais) ai.draw(ctx, state.camera.x, state.camera.y);
                    if (state.player) state.player.draw(ctx, state.camera.x, state.camera.y);
                }

                // Minimap
                if (state.phase === 'PLAYING') {
                    minimapCanvas.width = minimapCanvas.parentElement.clientWidth;
                    minimapCanvas.height = minimapCanvas.parentElement.clientHeight;
                    const w = minimapCanvas.width, r = w/2;
                    ctxMinimap.clearRect(0,0,w,w);
                    ctxMinimap.beginPath(); ctxMinimap.arc(r,r,r,0,Math.PI*2);
                    ctxMinimap.fillStyle = 'rgba(0,0,0,0.5)'; ctxMinimap.fill();

                    const mScale = r / CONFIG.MAP_RADIUS;

                    ctxMinimap.fillStyle = 'rgba(255,255,255,0.3)';
                    for(let f of state.foods) {
                        if(Math.random()>0.1) continue;
                        ctxMinimap.fillRect(r+f.x*mScale, r+f.y*mScale, 1, 1);
                    }

                    for (let ai of state.ais) {
                        if(ai.isDead) continue;
                        ctxMinimap.beginPath(); ctxMinimap.arc(r+ai.x*mScale, r+ai.y*mScale, 2, 0, Math.PI*2);
                        ctxMinimap.fillStyle = 'rgba(255,100,100,0.8)'; ctxMinimap.fill();
                    }

                    if (state.player && !state.player.isDead) {
                        ctxMinimap.beginPath(); ctxMinimap.arc(r+state.player.x*mScale, r+state.player.y*mScale, 3, 0, Math.PI*2);
                        ctxMinimap.fillStyle = '#0f0'; ctxMinimap.fill();
                    }
                }
            }

            let lastTime = 0;
            function gameLoop(timestamp) {
                const dt = timestamp - lastTime || 0;
                lastTime = timestamp;
                if (dt < 100) {
                    update(dt);
                    render();
                }
                requestAnimationFrame(gameLoop);
            }

            // --- INIT ---
            for(let i=0; i<300; i++) spawnFood(); // Populate background foods for menu
            setPhase('MENU');
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
